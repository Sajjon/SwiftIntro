name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Jobs ──────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Spell-check ──────────────────────────────────────────────────────────
  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for typos
        uses: crate-ci/typos@v1

  # ── 2. SwiftFormat ──────────────────────────────────────────────────────────
  swiftformat:
    name: SwiftFormat
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Check formatting
        # --lint exits non-zero if any file would be reformatted, without writing changes.
        run: swiftformat --lint SwiftIntro

  # ── 3. SwiftLint ────────────────────────────────────────────────────────────
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    env:
      # Keep in sync with the version installed locally via Homebrew.
      SWIFTLINT_VERSION: "0.63.2"
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint ${{ env.SWIFTLINT_VERSION }}
        run: |
          curl -fsSL \
            "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/SwiftLint.pkg" \
            -o /tmp/swiftlint.pkg
          sudo installer -pkg /tmp/swiftlint.pkg -target /
          swiftlint version

      - name: Lint
        # github-actions-logging emits ::error / ::warning annotations
        # that appear inline in the PR diff view.
        run: swiftlint lint --strict --reporter github-actions-logging

  # ── 4. Test + coverage ──────────────────────────────────────────────────────
  coverage:
    name: Test & Coverage
    runs-on: macos-15
    env:
      RESULT_BUNDLE: .build/TestResults.xcresult
      COV_XML: .build/coverage.xml
      SCHEME: SwiftIntro
      PROJECT: SwiftIntro.xcodeproj

    steps:
      - uses: actions/checkout@v4

      # Resolve the SPM dependency graph once and cache the result so that
      # subsequent runs skip the network fetch entirely.
      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install xcresultparser
        run: brew install xcresultparser

      # Discover the best available iPhone simulator at runtime so CI never
      # breaks because a specific device name was dropped from the runner image.
      # Strategy: parse JSON, collect all available iPhone devices across all
      # runtimes, sort by (runtime-identifier DESC, device-name DESC) to prefer
      # the newest runtime + newest model, and emit a UDID-based destination.
      # Using a UDID is unambiguous — xcodebuild never adds "OS:latest" to it.
      - name: Resolve iOS simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json | python3 - <<'EOF'
          import json, sys
          devs = json.load(sys.stdin)["devices"]
          iphones = sorted(
              [(rt, d) for rt, ds in devs.items()
               for d in ds if d["isAvailable"] and "iPhone" in d["name"]],
              key=lambda x: (x[0], x[1]["name"]),
              reverse=True,
          )
          if not iphones:
              sys.exit("No available iPhone simulator found — check runner image")
          rt, dev = iphones[0]
          print(f"Selected: {dev['name']} on {rt}", file=sys.stderr)
          print(dev["udid"])
          EOF
          )
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build & test with coverage
        run: |
          set -o pipefail
          mkdir -p .build
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -only-testing:SwiftIntroTests \
            -enableCodeCoverage YES \
            -resultBundlePath "$RESULT_BUNDLE" \
            | xcpretty

      - name: Convert coverage to Cobertura XML
        run: xcresultparser --output-format cobertura "$RESULT_BUNDLE" "$COV_XML"

      - name: Print coverage summary
        run: xcrun xccov view --report "$RESULT_BUNDLE"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ env.COV_XML }}
          # CODECOV_TOKEN must be added to the repo's Actions secrets.
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
