disabled_rules:
  - trailing_newline
  - trailing_whitespace
  - todo

included:
  - SwiftIntro

excluded:
  - Carthage
  - Pods
  - SwiftIntro/Models/Generated   # auto-generated by SwiftGen, not hand-edited

line_length: 200

type_name:
  min_length: 4
  max_length:
    warning: 80
    error: 120

type_body_length:
  warning: 300
  error: 400

# Mobius update functions are pure switch statements that are intentionally
# long; pure functions and layout helpers likewise.
function_body_length:
  warning: 40
  error: 60

function_parameter_count:
  warning: 4
  error: 5

# Allow common iOS/UIKit abbreviations (iv = imageView, cv = collectionView)
# and single-letter loop indices (i) that are idiomatic Swift.
identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - i
    - id
