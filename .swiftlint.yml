disabled_rules:
  - trailing_newline
  - trailing_whitespace
  - todo

opt_in_rules:
  # Require every function/method with 2+ parameters to place each on its own line.
  - multiline_parameters

multiline_parameters:
  allows_single_line: false

# SwiftFormat's --commas always adds trailing commas in multi-line collections;
# require them here so both tools agree.
trailing_comma:
  mandatory_comma: true

included:
  - SwiftIntro
  - SwiftIntroTests

excluded:
  - Carthage
  - Pods
  - SwiftIntro/Models/Generated   # auto-generated by SwiftGen, not hand-edited

line_length: 200

type_name:
  min_length: 4
  max_length:
    warning: 80
    error: 120

type_body_length:
  warning: 300
  error: 400

# Mobius update functions are pure switch statements that are intentionally
# long; pure functions and layout helpers likewise. Keep this rule enabled,
# but use practical thresholds so valid longer functions do not fail CI.
function_body_length:
  warning: 30
  error: 50

function_parameter_count:
  warning: 4
  error: 5

# Complexity / cognitive-load metric.
# cyclomatic_complexity counts every branch point (if, guard, for, case, &&, ||).
# Keep this strict enough to catch overly complex methods, but high enough for
# real-world UIKit and Mobius reducer/update functions that are switch-heavy.
cyclomatic_complexity:
  warning: 10
  error: 15

# Allow common iOS/UIKit abbreviations (iv = imageView, cv = collectionView)
# and single-letter loop indices (i) that are idiomatic Swift.
identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - i
    - id
