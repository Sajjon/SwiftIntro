disabled_rules:
  - trailing_newline
  - trailing_whitespace
  - todo

# SwiftFormat's --commas always adds trailing commas in multi-line collections;
# require them here so both tools agree.
trailing_comma:
  mandatory_comma: true

included:
  - SwiftIntro

excluded:
  - Carthage
  - Pods
  - SwiftIntro/Models/Generated   # auto-generated by SwiftGen, not hand-edited

line_length: 200

type_name:
  min_length: 4
  max_length:
    warning: 80
    error: 120

type_body_length:
  warning: 300
  error: 400

# Mobius update functions are pure switch statements that are intentionally
# long; pure functions and layout helpers likewise.
function_body_length:
  warning: 10 # same as error — effectively no-warning zone
  error: 10

function_parameter_count:
  warning: 4
  error: 5

# Complexity / cognitive-load metric.
# cyclomatic_complexity counts every branch point (if, guard, for, case, &&, ||).
# Threshold of 5 forces extraction of helpers before logic gets hard to reason about.
cyclomatic_complexity:
  warning: 5  # same as error — effectively no-warning zone
  error: 5

# Allow common iOS/UIKit abbreviations (iv = imageView, cv = collectionView)
# and single-letter loop indices (i) that are idiomatic Swift.
identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - i
    - id
