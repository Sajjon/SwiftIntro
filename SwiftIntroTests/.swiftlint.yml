# Per-target overrides for the test suite.
# Inherits all rules from the root .swiftlint.yml; only overrides listed below.

# Test functions are intentionally longer than production functions:
# each test has a full Arrange / Act / Assert section.
function_body_length:
  warning: 30
  error: 40

# Test files are naturally longer than production files — each test case adds
# several lines of Arrange / Act / Assert, so the 400-line default is too tight.
file_length:
  warning: 500
  error: 500

# Tests routinely use single-letter names for short-lived locals (`vc`, `vm`,
# `cv`, `ds`, `a`, `b`) where a longer name would just add noise. Lower the
# floor to 1 char in test code only — production code keeps the stricter rule.
identifier_name:
  min_length:
    warning: 1
    error: 1